spring.application.name=springbootprojstructure

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:umdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
# Security hardening defaults:
# Do not leak SQL/query structure via logs in production profiles.
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false

# Hibernate 6 connection handling hardening
spring.jpa.properties.hibernate.connection.handling_mode=DELAYED_ACQUISITION_AND_RELEASE_AFTER_TRANSACTION

# Log file at project root
logging.file.name=user-prompt.log
logging.level.root=INFO

# Central LDAP server connection (example)
spring.ldap.urls=ldap://localhost:389
spring.ldap.base=dc=example,dc=com
spring.ldap.username=cn=admin,dc=example,dc=com
spring.ldap.password=admin

# App-level directory search base under a given dc (example)
app.ldap.baseTemplate=dc=%s,dc=example,dc=com